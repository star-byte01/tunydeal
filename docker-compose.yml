version: '3.8'

services:
  # Frontend Next.js App
  frontend:
    build:
      context: ./apps/frontend
      dockerfile: Dockerfile
    command: npm run dev
    ports:
      - "3000:3000"
    volumes:
      # Mount the source code for hot-reloading
      - ./apps/frontend:/app
      # Exclude node_modules from being overwritten by the volume mount
      - /app/node_modules
    env_file:
      - ./.env.local # Load local environment variables
    depends_on:
      - saleor
      - meilisearch

  # Mock Saleor API
  # This is a simple placeholder. A real mock could use a tool like `json-graphql-server`
  saleor:
    image: nginx:alpine
    ports:
      - "8000:80"
    volumes:
      - ./mocks/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./mocks/saleor_graphql_schema.json:/usr/share/nginx/html/graphql:ro
    # In a real scenario, you'd have a mock server that returns valid GraphQL responses.
    # For now, nginx just serves a static file to have an endpoint available.

  # Meilisearch Instance
  meilisearch:
    image: getmeili/meilisearch:v1.3
    ports:
      - "7700:7700"
    environment:
      - MEILI_MASTER_KEY=${MEILISEARCH_API_KEY:-replace_me_in_env_local}
      - MEILI_ENV=development
    volumes:
      - meili_data:/meili_data

volumes:
  meili_data:
