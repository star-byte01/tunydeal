version: '3.8'

services:
  frontend:
    build:
      context: ./apps/frontend
      dockerfile: Dockerfile
    # --- THIS IS THE FINAL CHANGE ---
    # BEFORE:
    # command: ["npm", "run", "start"]
    # AFTER:
    command: ["node", "server.js"]
    ports:
      - "3000:3000"
    env_file:
      - ./.env.local
    depends_on:
      - saleor
      - meilisearch

  # Mock Saleor API
  saleor:
    image: nginx:alpine
    ports:
      - "8000:80"
    volumes:
      - ./mocks/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./mocks/saleor_graphql_schema.json:/usr/share/nginx/html/graphql:ro

  # Meilisearch Instance
  meilisearch:
    image: getmeili/meilisearch:v1.3
    ports:
      - "7700:7700"
    environment:
      - MEILI_MASTER_KEY=${MEILISEARCH_API_KEY:-replace_me_in_env_local}
      - MEILI_ENV=development
    volumes:
      - meili_data:/meili_data

volumes:
  meili_data: